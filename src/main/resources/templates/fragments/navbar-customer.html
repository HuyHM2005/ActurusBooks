<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <div th:fragment="navbar">
        <section class="navbar-top">
            <nav class="navbar navbar-expand-lg bg-white shadow-sm py-3">
                <div class="row w-100 align-items-center">
                    <div class="col-2 text-center">
                        <a class="navbar-brand fw-bold" th:href="@{/}">ActurusBooks</a>
                    </div>
                    <div class="col-5">
                        <ul class="navbar-nav">
                            <li class="nav-item"><a class="nav-link" th:href="@{/}">Trang chủ</a></li>
                            <li class="nav-item"><a class="nav-link" th:href="@{/product}">Sản phẩm</a></li>
                            <li class="nav-item"><a class="nav-link" th:href="@{/promotions}">Khuyến mãi</a></li>
                            <li class="nav-item"><a class="nav-link" th:href="@{/contact}">Liên hệ</a></li>
                            <li class="nav-item" th:if="${isAdmin}">
                                <a class="nav-link text-danger" th:href="@{/admin/dashboard}">Dashboard</a>
                            </li>
                        </ul>
                    </div>
                    <div class="col-5 d-flex justify-content-end">
                        <div class="nav-icons d-flex align-items-center">
                            <a th:href="@{/search}" class="me-3"><i class="bi bi-search"></i></a>
                            <a th:href="@{/profile}" class="me-3"><i class="bi bi-person"></i></a>
                            <a th:href="@{/wishlist}" class="me-3"><i class="bi bi-heart"></i></a>
                            <a th:href="@{/cart/view}"><i class="bi bi-cart"></i></a>
                        </div>
                    </div>
                </div>
            </nav>
        </section>
    </div>
</body>

</html>
